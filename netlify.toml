[build]
  publish = "."
  functions = "netlify/functions"

# /api/proxy/* → Netlify Function
[[redirects]]
  from = "/api/proxy/*"
  to = "/.netlify/functions/proxy/:splat"
  status = 200

[context.production.environment]
  GH_REPO = "heliang0817-eng/genflow"
  GH_FILE = "data/shared-history.json"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
