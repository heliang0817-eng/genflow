[build]
  publish = "."
  functions = "netlify/functions"

[[edge_functions]]
  function = "proxy"
  path = "/api/proxy"

[[edge_functions]]
  function = "proxy"
  path = "/api/proxy/*"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    X-Content-Type-Options = "nosniff"
